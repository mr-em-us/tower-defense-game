<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tower Defense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="mode-menu" class="hidden">
      <div class="menu-title">TOWER DEFENSE</div>
      <div style="font-size:10px;color:#475569;margin-top:-4px;margin-bottom:4px;">v2026.03.21a</div>
      <div class="menu-subtitle">Select Mode</div>
      <div class="menu-buttons">
        <button id="btn-single" class="menu-btn">Single Player</button>
        <div id="ai-options" style="display:flex;align-items:center;justify-content:center;gap:8px;margin:-4px 0 4px;">
          <label style="font-size:12px;color:#94A3B8;cursor:pointer;display:flex;align-items:center;gap:4px;">
            <input type="checkbox" id="ai-toggle" style="cursor:pointer;"> Include AI
          </label>
        </div>
        <div id="start-wave-options" style="display:flex;align-items:center;justify-content:center;gap:8px;margin:-4px 0 8px;">
          <label style="font-size:12px;color:#94A3B8;display:flex;align-items:center;gap:4px;">
            Start Wave:
            <select id="start-wave-select" style="font-family:inherit;font-size:12px;padding:2px 6px;background:#1E293B;color:#fff;border:1px solid #475569;border-radius:4px;">
              <option value="1" selected>1</option>
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="15">15</option>
              <option value="20">20</option>
              <option value="25">25</option>
              <option value="30">30</option>
            </select>
          </label>
        </div>
        <button id="btn-multi" class="menu-btn">Multiplayer</button>
        <button id="btn-observer" class="menu-btn" style="margin-top:8px;opacity:0.85;font-size:14px;">Watch AI Play</button>
      </div>
      <div id="menu-difficulty" class="menu-difficulty hidden">
        <span id="menu-difficulty-label"></span>
        <span id="menu-difficulty-value"></span>
      </div>
      <button id="btn-settings" class="menu-btn settings-trigger">Settings</button>
      <button id="btn-leaderboard" class="menu-btn settings-trigger">Leaderboard</button>
      <button id="btn-load-save" class="menu-btn settings-trigger">Load Game</button>
      <a href="sandbox.html" class="menu-btn settings-trigger" style="display:inline-block;text-decoration:none;text-align:center;font-size:14px;opacity:0.6;">Dev Sandbox</a>
    </div>
    <div id="username-panel" class="hidden"></div>
    <div id="leaderboard-panel" class="hidden"></div>
    <div id="save-panel" class="hidden"></div>
    <div id="settings-panel" class="hidden"></div>
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-left" class="hud-panel"></div>
      <div id="hud-center" class="hud-panel"></div>
      <div id="hud-right" class="hud-panel"></div>
    </div>
    <div id="tower-bar"></div>
    <div id="overlay" class="hidden">
      <div id="overlay-content"></div>
    </div>
  </div>
  <div id="rotate-prompt">
    <div class="rotate-icon">&#x21BB;</div>
    <div>Rotate your device to landscape</div>
    <div style="font-size:13px;opacity:0.6">This game works best in landscape mode</div>
    <button onclick="this.parentElement.style.display='none'">Play anyway</button>
  </div>
  <script type="module" src="bundle.js"></script>
</body>
</html>
